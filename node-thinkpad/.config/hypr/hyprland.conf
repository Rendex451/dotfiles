# Monitor configuration
$MON1 = eDP-1
$MON2 = HDMI-A-2

#monitor=,1920x1080@60,auto,1

# monitor=$MON1,1920x1080@60,0x1080,1
# monitor=$MON2,1920x1080@180,0x0,1
monitor=$MON1,1920x1080@60,0x1440,1
monitor=$MON2,2560x1440@165,0x0,1

# Different variables
#$fileManager=$terminal -e sh -c 'nautilus'
$fileManager=nautilus
$mainMod=SUPER
$menu=rofi -show drun
$terminal=alacritty

# Autostart
exec-once=waybar
exec-once=wl-paste --type text --watch cliphist store
exec-once=wl-paste --type image --watch cliphist store
exec-once=awww-daemon
exec-once=nm-applet
exec-once=awww img ~/.local/share/backgrounds/thinkpad.png

# Usual stuff
general {
  allow_tearing=false
  border_size=5
  col.active_border=rgb(ff5555) # rgba(98971aff) 45deg
  col.inactive_border=rgb(282a36) # rgba(3c3836ff)
  gaps_in=0
  gaps_out=0
  layout=dwindle
  resize_on_border=true
}

# Disable notifications after update
ecosystem {
  no_update_news=true
}

animations {
  enabled=true
#  animation_duration=150
#  bezier_duration=150
#  bezier_curve=my_fast_curve, 0.25, 0.1, 0.25, 1.0
#  fade_duration=100
#  slide_duration=150
}

# No blur, shadows and transparency 🗿
decoration {
  blur {
    enabled=false
  }

  shadow {
    enabled=false
  }
  active_opacity=1.000000
  inactive_opacity=1.000000
  rounding=0
}

# 3 finger swipe gesture for workspace switching
gesture = 3, horizontal, workspace
gestures {
  workspace_swipe_forever = true
  workspace_swipe_invert = true
}

# touchpad
input {
    touchpad {
        disable_while_typing = false
        natural_scroll = true
        scroll_factor = 1
        tap-and-drag = true
    }
}

# Keyboard layout configuration
input {
  kb_layout=us,ru
  kb_options=grp:win_space_toggle
}

# DWM-like window layout
master {
  mfact=0.500000
  new_on_top=true
  new_status=slave
}

dwindle {
  preserve_split=true
  pseudotile=true
}

# No default wallpaper
misc {
  disable_hyprland_logo=true
  force_default_wallpaper=0
}

# Main keybinds. See README.md for a nice table
bind=$mainMod, Return, exec, $terminal
bind=$mainMod, W, killactive,
bind=$mainMod, R, exit,
bind=$mainMod, N, exec, $fileManager
#bind=$mainMod,       F, togglefloating,
bind=$mainMod, F, fullscreen,
bind=$mainMod, D, exec, $menu
bind=$mainMod, P, pin,
#bind=$mainMod,       J, togglesplit,
#bind=$mainMod,       E, exec, bemoji -cn
#bind=$mainMod,       V, exec, cliphist list | $menu --dmenu | cliphist decode | wl-copy
bind=$mainMod, B, exec, pkill -SIGUSR2 waybar
#bind=$mainMod SHIFT, B, exec, pkill -SIGUSR1 waybar
bind=$mainMod, L, exec, hyprlock
bind=$mainMod, H, exec, wlogout
bind=$mainMod, P, exec, hyprpicker -an
bind=$mainMod, C, exec, swaync-client -t
bind=, Print, exec, grimblast --notify --freeze copysave area

# Global binds
#bind=$mainMod SHIFT, O, pass, class:^(com\.obsproject\.Studio)$

# Program binds
bind=$mainMod SHIFT, O, exec, obsidian
bind=$mainMod SHIFT, C, exec, code
bind=$mainMod SHIFT, T, exec, Telegram
bind=$mainMod SHIFT, F, exec, firefox
bind=$mainMod SHIFT, G, exec, google-chrome-stable
bind=$mainMod SHIFT, A, exec, AmneziaVPN


# Move focus
bind=$mainMod, left, movefocus, l
bind=$mainMod, right, movefocus, r
bind=$mainMod, up, movefocus, u
bind=$mainMod, down, movefocus, d

# Swap window
bind=$mainMod SHIFT, left,  swapwindow, l
bind=$mainMod SHIFT, right, swapwindow, r
bind=$mainMod SHIFT, up,    swapwindow, u
bind=$mainMod SHIFT, down,  swapwindow, d

# Resize window                           X  Y
bind=$mainMod CTRL, left,  resizeactive, -60 0
bind=$mainMod CTRL, right, resizeactive,  60 0
bind=$mainMod CTRL, up,    resizeactive,  0 -60
bind=$mainMod CTRL, down,  resizeactive,  0  60

# Switch to workspace
bind=$mainMod, 1, workspace, 1
bind=$mainMod, 2, workspace, 2
bind=$mainMod, 3, workspace, 3
bind=$mainMod, 4, workspace, 4
bind=$mainMod, 5, workspace, 5
bind=$mainMod, 6, workspace, 6
bind=$mainMod, 7, workspace, 7
bind=$mainMod, 8, workspace, 8
bind=$mainMod, 9, workspace, 9
bind=$mainMod, 0, workspace, 10

# Move window to workspace
bind=$mainMod SHIFT, 1, movetoworkspacesilent, 1
bind=$mainMod SHIFT, 2, movetoworkspacesilent, 2
bind=$mainMod SHIFT, 3, movetoworkspacesilent, 3
bind=$mainMod SHIFT, 4, movetoworkspacesilent, 4
bind=$mainMod SHIFT, 5, movetoworkspacesilent, 5
bind=$mainMod SHIFT, 6, movetoworkspacesilent, 6
bind=$mainMod SHIFT, 7, movetoworkspacesilent, 7
bind=$mainMod SHIFT, 8, movetoworkspacesilent, 8
bind=$mainMod SHIFT, 9, movetoworkspacesilent, 9
bind=$mainMod SHIFT, 0, movetoworkspacesilent, 10

# Magic workspace 🪄
bind=$mainMod,       S, togglespecialworkspace,  magic
bind=$mainMod SHIFT, S, movetoworkspace, special:magic

# Volume management
bindel=,XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel=,XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel=,XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel=,XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness management
bindel=,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel=,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Multimedia binds
bindl=, XF86AudioNext,  exec, playerctl next
bindl=, XF86AudioPause, exec, playerctl play-pause
bindl=, XF86AudioPlay,  exec, playerctl play-pause
bindl=, XF86AudioPrev,  exec, playerctl previous

# Move with LMS
bindm=$mainMod, mouse:272, movewindow
# Resize with RMS
bindm=$mainMod, mouse:273, resizewindow

# Environment variables
env=XDG_CURRENT_DESKTOP,Hyprland
env=XDG_SESSION_TYPE,wayland
env=XDG_SESSION_DESKTOP,Hyprland
env=QT_QPA_PLATFORM,wayland
env=XDG_SCREENSHOTS_DIR,$HOME/screens


# If there is just one tiling window on the workspace it will be borderless
# windowrule=bordersize 0, floating:0, onworkspace:w[t1]

# Floating by default
windowrule=match:class blueman-manager, float yes
# Where to spawn showmethekey-gtk window
# windowrule=move 990 60,size 900 170,pin,noinitialfocus,class:(showmethekey-gtk)
# windowrule=noborder,nofocus,class:(showmethekey-gtk)

# Distribution of windows among workspaces
# windowrule=match:class obsidian, workspace 6
# windowrule=match:class zathura, workspace 6
# windowrule=match:class Files, workspace 3
# windowrule=match:class google-chrome-stable, workspace 1
# windowrule=match:class telegram, workspace 4

# xwayland fixes
#windowrule=suppressevent maximize, class:.*0windowrulev2=nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
#windowrule=opacity 0.0 override, class:^(xwaylandvideobridge)$
#windowrule=noanim, class:^(xwaylandvideobridge)$
#windowrule=noinitialfocus, class:^(xwaylandvideobridge)$
#windowrule=maxsize 1 1, class:^(xwaylandvideobridge)$
#xindowrule=noblur, class:^(xwaylandvideobridge)$
#windowrule=nofocus, class:^(xwaylandvideobridge)$

# gaps
workspace=w[tv1], gapsout:0, gapsin:0
workspace=f[1], gapsout:0, gapsin:0

workspace = 1, monitor:$MON1, default:true
workspace = 2, monitor:$MON1
workspace = 3, monitor:$MON1
workspace = 4, monitor:$MON1
workspace = 5, monitor:$MON2, default:true
workspace = 6, monitor:$MON2
workspace = 7, monitor:$MON2
workspace = 8, monitor:$MON2
workspace = 9, monitor:$MON2
